<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 底色：青绿 -> 海蓝 对角渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <!-- 顶部柔光 -->
    <radialGradient id="gloss" cx="0.32" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- 底部加深 -->
    <linearGradient id="depth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#003049" stop-opacity="0.22"/>
    </linearGradient>
    <!-- 夹子琥珀渐变 -->
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- 板面轻微渐变 -->
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="boardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#013a52" flood-opacity="0.28"/>
    </filter>
    <filter id="clipShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7c3f00" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- 圆角方形底（macOS squircle 近似） -->
  <rect x="100" y="100" width="824" height="824" rx="184" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="184" fill="url(#gloss)"/>
  <rect x="100" y="100" width="824" height="824" rx="184" fill="url(#depth)"/>

  <!-- 背后的卡片（历史堆叠暗示） -->
  <g filter="url(#boardShadow)">
    <rect x="352" y="286" width="404" height="470" rx="48" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- 主剪贴板板面 -->
  <g filter="url(#boardShadow)">
    <rect x="300" y="312" width="424" height="470" rx="52" fill="url(#board)"/>
  </g>

  <!-- 内容行 -->
  <rect x="360" y="452" width="304" height="34" rx="17" fill="#2DD4BF"/>
  <rect x="360" y="524" width="304" height="30" rx="15" fill="#CBD5E1"/>
  <rect x="360" y="590" width="248" height="30" rx="15" fill="#CBD5E1"/>
  <rect x="360" y="656" width="176" height="30" rx="15" fill="#CBD5E1"/>

  <!-- 顶部夹子 -->
  <g filter="url(#clipShadow)">
    <!-- 夹子上方的夹柄 -->
    <rect x="462" y="250" width="100" height="70" rx="26" fill="#F59E0B"/>
    <!-- 夹子主体 -->
    <rect x="418" y="292" width="188" height="86" rx="30" fill="url(#clip)"/>
    <!-- 夹口高光 -->
    <rect x="452" y="270" width="120" height="16" rx="8" fill="#FDE68A" opacity="0.85"/>
  </g>
</svg>
